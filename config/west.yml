manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: te9no
      url-base: https://github.com/te9no
    - name: kot149
      url-base: https://github.com/kot149
    - name: mctechnology17
      url-base: https://github.com/mctechnology17
    - name: petejohanson
      url-base: https://github.com/petejohanson
    - name: cormoran
      url-base: https://github.com/cormoran

  projects:
    # ★ ZMK 本体は upstream 最新に戻す
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    # ★ 全モジュールを最新 ZMK 対応版に揃える
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main

    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: main

    - name: zmk-analog-input-driver
      remote: badjeff
      revision: main

    - name: zmk-nice-oled
      remote: te9no
      revision: main

#    - name: zmk-layout-shift
#      remote: kot149
#      revision: main

    - name: zmk-input-processor-keybind
      remote: te9no
      revision: main

    - name: cirque-input-module
      remote: petejohanson
      revision: main

    - name: zmk-driver-MLX90393
      remote: te9no
      revision: main

    # ★ v0.3 系モジュールは最新に更新（API互換）
    - name: zmk-module-runtime-input-processor
      remote: te9no
      revision: main

    - name: zmk-module-ble-management
      remote: cormoran
      revision: main

    - name: zmk-module-settings-rpc
      remote: cormoran
      revision: main

  self:
    path: config
